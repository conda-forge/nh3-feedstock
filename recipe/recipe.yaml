# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.3.5"
  maturin_min: "1.0"
  maturin_max: "2.0"
  python_check_max: "3.14"
  abi3_ext: ${{ "pyd" if win else "abi3.so" }}
  unix_sp_dir: |-
    $(python -c "print(__import__('site').getsitepackages()[-1])")/nh3
  win_sp_dir: |-
    Lib\site-packages\nh3
  sp_dir: |-
    ${{ "%PREFIX%\\" ~ win_sp_dir if win else unix_sp_dir }}

package:
  name: nh3
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/n/nh3/nh3-${{ version }}.tar.gz
  sha256: 45855e14ff056064fec77133bfcf7cd691838168e5e17bbef075394954dc9dc8

build:
  number: 1
  skip: is_abi3 and not is_python_min
  python:
    version_independent: ${{ is_abi3 }}
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation --disable-pip-version-check
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("rust") }}
    - ${{ stdlib("c") }}
    - cargo-bundle-licenses
  host:
    - maturin >=${{ maturin_min }},<${{ maturin_max }}
    - pip
    - python
    - if: is_abi3
      then:
        - python-abi3
  run:
    - python

tests:
  - if: is_abi3
    then:
      python:
        imports: nh3
        pip_check: true
        python_version:
          - ${{ python_min }}.*
          - ${{ python_check_max }}.*
    else:
      python:
        imports: nh3
        pip_check: true
  - files:
      source:
        - tests/
    requirements:
      run:
        - pytest-cov
        - if: is_abi3
          then:
            - python ${{ python_min }}.*
            - abi3audit
    script:
      - coverage run --source=nh3 --branch -m pytest -vv --tb=long --color=yes
      - coverage report --show-missing --skip-covered --fail-under=83
      - if: is_abi3
        then:
          - cd ${{ sp_dir }}
          - abi3audit -s -v --assume-minimum-abi3 ${{ python_min }} nh3.${{ abi3_ext }}

about:
  summary: Python binding to Ammonia HTML sanitizer Rust crate
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://pypi.org/project/nh3
  repository: https://github.com/messense/nh3
  documentation: https://nh3.readthedocs.io

extra:
  recipe-maintainers:
    - bollwyvl
